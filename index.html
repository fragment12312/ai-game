<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>clicker-game</title>
<!-- Bootstrap 4 CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  /* 暂停按钮响应式定位 */
  #pauseBtn {
    left: 130px;
  }
  /* 移动端适配：屏幕宽度小于 400px 时 */
  @media (max-width: 400px) {
    #pauseBtn {
      left: 100px;
    }
  }
  /* 更小屏幕 */
  @media (max-width: 320px) {
    #pauseBtn {
      left: 80px;
    }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<!-- 暂停按钮 -->
<button id="pauseBtn" class="btn btn-primary btn-sm" style="position: fixed; top: 10px; background: rgba(5, 5, 30, 0.85); border-color: #33ccff; color: #33ccff; box-shadow: 0 0 12px rgba(51, 204, 255, 0.3); border-radius: 8px; padding: 4px 12px; z-index: 10;">
  <i class="bi bi-pause-fill" style="font-size: 18px;"></i>
</button>
<!-- 暂停遮罩 -->
<div id="pauseOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 100; align-items: center; justify-content: center; display: none;">
  <button id="resumeBtn" class="btn btn-primary" style="background: rgba(51, 204, 255, 0.2); border-color: #33ccff; color: #33ccff; padding: 20px 30px; border-radius: 50%; box-shadow: 0 0 30px rgba(51, 204, 255, 0.5);">
    <i class="bi bi-play-fill" style="font-size: 60px;"></i>
  </button>
</div>
<!-- jQuery (Bootstrap 4 需要) -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<!-- Bootstrap 4 Bundle JS (包含 Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
<script>
// ==============================
// 1. 游戏配置
// ==============================
const CONFIG = {
  CANVAS_BG: '#0a0a1a',
  BASE_FALL_SPEED: 120,       // 像素/秒 (Lv1)
  SPAWN_INTERVAL: 800,        // 毫秒 (Lv1)
  MAX_SHAPES: 3,              // Lv1 同时存在最大图形数
  AVG_RADIUS: 45,             // Lv1 图形顶点半径均值（像素）
  MIN_VERTICES: 4,
  MAX_VERTICES: 8,
  SHAPE_COLORS: [
    '#ff3366', '#ff6633', '#ffcc00', '#33ff66',
    '#33ccff', '#cc33ff', '#ff3399', '#66ff33',
    '#ff9900', '#00ffcc', '#ff66cc', '#9933ff'
  ],
  GLOW_SHADOW_BLUR: 12,
  FLOAT_TEXT_DURATION: 0.5,   // 秒
  LEVEL_UP_DURATION: 1.0,     // 秒
  DELTA_TIME_CLAMP: 50,       // ms 上限
  TOUCH_TOLERANCE: 10,        // px，移动端 fat finger 容差
  POOL_MAX: 15,               // 对象池最大容量
  RED_LINE_PCT: 0.10,         // 红线距底部 10%
  GAME_OVER_DURATION: 1.0,    // 秒
};

// ==============================
// 2. 对象池
// ==============================
class ShapePool {
  constructor() {
    this.available = [];
  }

  acquire(level) {
    let shape;
    if (this.available.length > 0) {
      shape = this.available.pop();
      shape.reset(level);
    } else {
      shape = new IrregularShape(level);
    }
    return shape;
  }

  release(shape) {
    if (this.available.length < CONFIG.POOL_MAX) {
      this.available.push(shape);
    }
  }
}

// ==============================
// 3. 不规则图形类
// ==============================
class IrregularShape {
  constructor(level) {
    this.reset(level);
  }

  // 对象池复用时重置属性
  reset(level) {
    const minW = 320;
    const w = Math.max(minW, window.innerWidth);
    const avgRadius = CONFIG.AVG_RADIUS * getSizeScale(level);
    this.vertices = randomInt(CONFIG.MIN_VERTICES, CONFIG.MAX_VERTICES);
    this.points = generateIrregularPolygon(0, 0, avgRadius, this.vertices);
    // 随机起始位置（不超出画布边界）
    const margin = avgRadius + 20;
    this.x = margin + Math.random() * (w - margin * 2);
    this.y = -avgRadius - Math.random() * 100;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotationSpeed = (Math.random() - 0.5) * 4; // 弧度/秒
    this.color = CONFIG.SHAPE_COLORS[randomInt(0, CONFIG.SHAPE_COLORS.length - 1)];
    this.fallSpeed = CONFIG.BASE_FALL_SPEED * getSpeedScale(level);
    // 漂移参数
    const diff = getDifficultyParams(level);
    this.hasDrift = Math.random() < diff.driftProbability;
    this.driftSpeed = this.hasDrift
      ? (Math.random() - 0.5) * 2 * diff.driftAmplitude
      : 0;
    this.hasVariableSpeed = Math.random() < diff.varSpeedProbability;
    this.varSpeedFactor = this.hasVariableSpeed
      ? 1 + (Math.random() - 0.5) * 2 * diff.varSpeedRange
      : 1;
    // 包围盒中心
    this.bounds = computeBounds(this.points);
    this.cx = this.bounds.cx;
    this.cy = this.bounds.cy;
    this.alive = true;
  }

  update(dt) {
    const effectiveSpeed = this.fallSpeed * (this.hasVariableSpeed ? this.varSpeedFactor : 1);
    this.y += effectiveSpeed * dt;
    this.x += this.driftSpeed * dt;
    this.rotation += this.rotationSpeed * dt;
  }

  // 获取当前旋转后的世界坐标顶点
  getWorldVertices() {
    const cos = Math.cos(this.rotation);
    const sin = Math.sin(this.rotation);
    return this.points.map(p => ({
      x: this.x + (p.x - this.cx) * cos - (p.y - this.cy) * sin,
      y: this.y + (p.x - this.cx) * sin + (p.y - this.cy) * cos
    }));
  }

  draw(ctx) {
    const verts = this.getWorldVertices();
    ctx.save();
    // 多层辉光
    ctx.shadowColor = this.color;
    ctx.shadowBlur = CONFIG.GLOW_SHADOW_BLUR;
    ctx.fillStyle = this.color;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(verts[0].x, verts[0].y);
    for (let i = 1; i < verts.length; i++) {
      ctx.lineTo(verts[i].x, verts[i].y);
    }
    ctx.closePath();
    ctx.fill();
    // 第二层辉光
    ctx.shadowBlur = CONFIG.GLOW_SHADOW_BLUR * 1.8;
    ctx.shadowColor = this.color;
    ctx.globalAlpha = 0.4;
    ctx.fill();
    ctx.restore();
  }

  // 判断图形是否完全离开画布底部
  isOutOfBounds(canvasHeight) {
    const verts = this.getWorldVertices();
    let maxY = -Infinity;
    for (const v of verts) {
      if (v.y > maxY) maxY = v.y;
    }
    return maxY < -50 || this.y - this.bounds.radius > canvasHeight + 50;
  }
}

// ---- 图形工具函数 ----

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateIrregularPolygon(cx, cy, avgRadius, vertices) {
  const points = [];
  for (let i = 0; i < vertices; i++) {
    const angle = (i / vertices) * Math.PI * 2;
    const r = avgRadius * (0.5 + Math.random() * 0.8);
    points.push({
      x: cx + Math.cos(angle) * r,
      y: cy + Math.sin(angle) * r
    });
  }
  return points;
}

function computeBounds(points) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of points) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  return {
    cx: (minX + maxX) / 2,
    cy: (minY + maxY) / 2,
    radius: Math.max(maxX - minX, maxY - minY) / 2
  };
}

// 射线法碰撞检测：先将点击点反向旋转到图形的局部坐标系，再做水平射线法
function isPointInPolygon(px, py, shape) {
  const cos = Math.cos(-shape.rotation);
  const sin = Math.sin(-shape.rotation);
  const dx = px - shape.x;
  const dy = py - shape.y;
  const localX = dx * cos - dy * sin;
  const localY = dx * sin + dy * cos;

  const pts = shape.points;
  const n = pts.length;
  let inside = false;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = pts[i].x, yi = pts[i].y;
    const xj = pts[j].x, yj = pts[j].y;
    if ((yi > localY) !== (yj > localY)) {
      const intersectX = xj + ((localY - yj) / (yi - yj)) * (xi - xj);
      if (localX < intersectX) inside = !inside;
    }
  }
  return inside;
}

// 容差版：在点击点 ±tolerance 范围内采样检测
function hitTestWithTolerance(px, py, shape, tolerance) {
  const offsets = tolerance > 0
    ? [{x:0,y:0},{x:tolerance,y:0},{x:-tolerance,y:0},{x:0,y:tolerance},{x:0,y:-tolerance}]
    : [{x:0,y:0}];
  for (const off of offsets) {
    if (isPointInPolygon(px + off.x, py + off.y, shape)) return true;
  }
  return false;
}

// ---- 难度参数 ----

function getSpeedScale(level) {
  if (level >= 6) return Math.min(3.5 + (level - 6) * 0.3, 4.0);
  return [1.0, 1.0, 1.3, 1.6, 2.0, 2.5, 2.8][level] || 1.0;
}

function getSizeScale(level) {
  if (level >= 6) return 0.55;
  return [1.0, 1.0, 0.9, 0.8, 0.7, 0.6, 0.55][level] || 1.0;
}

function getMaxShapes(level) {
  return Math.min(3 + (level - 1), 10);
}

function getSpawnInterval(level) {
  if (level >= 6) return Math.max(350 - (level - 6) * 50, 250);
  return 800 - (level - 1) * 100;
}

function getDifficultyParams(level) {
  if (level <= 1) return { driftProbability: 0, driftAmplitude: 0, varSpeedProbability: 0, varSpeedRange: 0 };
  if (level === 2) return { driftProbability: 0.4, driftAmplitude: 30, varSpeedProbability: 0, varSpeedRange: 0 };
  if (level === 3) return { driftProbability: 0.7, driftAmplitude: 60, varSpeedProbability: 0, varSpeedRange: 0 };
  if (level === 4) return { driftProbability: 0.7, driftAmplitude: 60, varSpeedProbability: 0.3, varSpeedRange: 0.4 };
  // level >= 5
  return { driftProbability: 1.0, driftAmplitude: 80, varSpeedProbability: 1.0, varSpeedRange: 0.5 };
}

// ==============================
// 4. "+1" 浮动文字特效类
// ==============================
class FloatingText {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.age = 0;
    this.duration = CONFIG.FLOAT_TEXT_DURATION;
    this.alive = true;
  }

  update(dt) {
    this.age += dt;
    if (this.age >= this.duration) {
      this.alive = false;
      return;
    }
    // 上飘
    this.y -= 60 * dt;
  }

  draw(ctx) {
    const progress = this.age / this.duration;
    const alpha = 1 - progress; // 线性淡出
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fillText('+10', this.x, this.y);
    ctx.restore();
  }
}

// ==============================
// 5. "LEVEL UP!" 升级特效类
// ==============================
class LevelUpEffect {
  constructor() {
    this.age = 0;
    this.duration = CONFIG.LEVEL_UP_DURATION;
    this.alive = true;
  }

  update(dt) {
    this.age += dt;
    if (this.age >= this.duration) {
      this.alive = false;
    }
  }

  draw(ctx, canvasWidth, canvasHeight) {
    const progress = this.age / this.duration;
    // 缩放弹入效果
    const scale = 1 + (1 - Math.min(progress * 2, 1)) * 0.6;
    const alpha = progress < 0.7 ? 1 : 1 - (progress - 0.7) / 0.3;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(canvasWidth / 2, canvasHeight / 2);
    ctx.scale(scale, scale);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 56px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 30;
    ctx.fillText('LEVEL UP!', 0, 0);
    // 第二层辉光
    ctx.shadowBlur = 60;
    ctx.fillText('LEVEL UP!', 0, 0);
    ctx.restore();
  }
}

// ==============================
// 6. "GAME OVER" 结束特效类
// ==============================
class GameOverEffect {
  constructor() {
    this.age = 0;
    this.duration = CONFIG.GAME_OVER_DURATION;
    this.alive = true;
  }

  update(dt) {
    this.age += dt;
    if (this.age >= this.duration) {
      this.alive = false;
    }
  }

  draw(ctx, canvasWidth, canvasHeight) {
    const progress = this.age / this.duration;
    // 红色闪烁脉冲
    const pulse = Math.sin(progress * Math.PI * 4) * 0.3 + 0.7;
    const alpha = Math.min(1, pulse);
    ctx.save();
    // 全屏红色遮罩
    ctx.fillStyle = 'rgba(255, 0, 0, ' + (alpha * 0.25) + ')';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    // 文字
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 64px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 40;
    ctx.fillText('GAME OVER', canvasWidth / 2, canvasHeight / 2);
    ctx.shadowBlur = 80;
    ctx.fillText('GAME OVER', canvasWidth / 2, canvasHeight / 2);
    ctx.restore();
  }
}

// ==============================
// 7. 游戏主类
// ==============================
class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.pool = new ShapePool();
    this.score = 0;
    this.level = 1;
    this.shapes = [];
    this.floatingTexts = [];
    this.levelUpEffect = null;
    this.gameOverEffect = null;
    this.spawnTimer = 0;
    this.gameOver = false;
    this.deadLineY = 0;
    this.deadLineTimer = 0;  // 红线颜色变化计时器
    this.running = false;
    this.paused = false;  // 暂停状态

    this.handleResize();
    this.bindEvents();
  }

  // ---- Canvas 自适应 ----
  handleResize() {
    const dpr = window.devicePixelRatio || 1;
    const minW = 320;
    const rawW = window.innerWidth;
    const rawH = window.innerHeight;
    const w = Math.max(minW, rawW);
    const h = Math.max(240, rawH);

    // 保持上一个宽度以修正图形位置
    const prevWidth = this.width || w;
    const prevHeight = this.height || h;

    this.canvas.width = w * dpr;
    this.canvas.height = h * dpr;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.width = w;
    this.height = h;
    // 红线位置：距底部 10%
    this.deadLineY = h * (1 - CONFIG.RED_LINE_PCT);

    // resize 后修正所有图形的 x 坐标，防止越界
    if (this.shapes) {
      for (const shape of this.shapes) {
        const margin = CONFIG.AVG_RADIUS + 20;
        shape.x = Math.max(margin, Math.min(shape.x, w - margin));
        shape.y = Math.min(shape.y, h + 100); // 防止瞬移到底部很远
      }
    }
  }

  // ---- 事件绑定 ----
  bindEvents() {
    window.addEventListener('resize', () => this.handleResize());
    this.canvas.addEventListener('click', (e) => this.handleClick(e));
    this.canvas.addEventListener('touchstart', (e) => this.handleTouch(e), { passive: false });
    
    // 暂停按钮事件
    document.getElementById('pauseBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (this.paused) {
        this.resume();
      } else {
        this.pause();
      }
    });
    
    // 继续按钮事件
    document.getElementById('resumeBtn').addEventListener('click', (e) => {
      this.resume();
    });
  }

  // 获取 canvas 坐标
  getCanvasPos(e) {
    const rect = this.canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  handleClick(e) {
    const pos = this.getCanvasPos(e);
    this.processHit(pos.x, pos.y, 0);
  }

  handleTouch(e) {
    e.preventDefault();
    if (e.touches.length > 0) {
      const pos = this.getCanvasPos(e.touches[0]);
      this.processHit(pos.x, pos.y, CONFIG.TOUCH_TOLERANCE);
    }
  }

  // 命中检测：从上层到下层遍历，命中第一个即停
  processHit(x, y, tolerance) {
    for (let i = this.shapes.length - 1; i >= 0; i--) {
      const shape = this.shapes[i];
      if (hitTestWithTolerance(x, y, shape, tolerance)) {
        // 命中！
        this.score += 10;
        this.floatingTexts.push(new FloatingText(x, y, shape.color));
        this.shapes.splice(i, 1);
        this.pool.release(shape);
        // 每 100 分升级
        if (this.score % 100 === 0) {
          this.level++;
          this.levelUpEffect = new LevelUpEffect();
        }
        return; // 只命中一个
      }
    }
  }

  // ---- 游戏结束 ----
  endGame() {
    this.gameOver = true;
    this.gameOverEffect = new GameOverEffect();
    // 存最高分到 localStorage
    const prev = parseInt(localStorage.getItem('clicker_high_score') || '0');
    if (this.score > prev) {
      localStorage.setItem('clicker_high_score', this.score);
      localStorage.setItem('clicker_high_level', this.level);
    }
  }

  // ---- 图形生成 ----
  spawnShape() {
    if (this.shapes.length >= getMaxShapes(this.level)) return;
    const shape = this.pool.acquire(this.level);
    this.shapes.push(shape);
  }

  // ---- 赛博朋克网格背景 ----
  drawBackground(ctx) {
    ctx.fillStyle = CONFIG.CANVAS_BG;
    ctx.fillRect(0, 0, this.width, this.height);

    // 透视网格线（微微发光）
    const gridSize = 50;
    ctx.strokeStyle = 'rgba(51, 204, 255, 0.06)';
    ctx.lineWidth = 0.5;
    ctx.shadowColor = 'rgba(51, 204, 255, 0.15)';
    ctx.shadowBlur = 1;
    ctx.beginPath();
    // 垂直线
    for (let x = gridSize; x < this.width; x += gridSize) {
      ctx.moveTo(x, 0);
      ctx.lineTo(x, this.height);
    }
    // 水平线
    for (let y = gridSize; y < this.height; y += gridSize) {
      ctx.moveTo(0, y);
      ctx.lineTo(this.width, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ---- 底部红线绘制 ----
  drawDeadLine(ctx) {
    const y = this.deadLineY;
    // 计算颜色渐变（1秒周期，黑红交替）
    const cycle = Math.sin(this.deadLineTimer * Math.PI * 2);  // -1 到 1
    const intensity = (cycle + 1) / 2;  // 0 到 1，0=黑色，1=红色
    // 混合黑色和红色
    const r = Math.floor(255 * intensity);
    const g = Math.floor(0 * intensity);
    const b = Math.floor(0 * intensity);
    const color = `rgb(${r}, ${g}, ${b})`;
    
    ctx.lineWidth = 2;
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.globalAlpha = 0.5 + intensity * 0.4;  // 透明度随颜色变化
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(this.width, y);
    ctx.stroke();
    // 外层大辉光
    ctx.shadowBlur = 30;
    ctx.globalAlpha = 0.2 + intensity * 0.3;
    ctx.stroke();
    // 虚线节奏线
    ctx.shadowBlur = 8;
    ctx.globalAlpha = 0.1 + intensity * 0.2;
    ctx.setLineDash([20, 60]);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(this.width, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // ---- HUD 顶栏绘制 ----
  drawHUD(ctx) {
    const pointsToNext = 100 - (this.score % 100);
    const barHeight = 52;
    const padding = 16;

    // 半透明背景条
    ctx.fillStyle = 'rgba(5, 5, 30, 0.75)';
    ctx.fillRect(0, 0, this.width, barHeight);
    // 底部亮线
    ctx.strokeStyle = '#33ccff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(0, barHeight);
    ctx.lineTo(this.width, barHeight);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // 左侧：分数
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#33ccff';
    ctx.shadowBlur = 6;
    ctx.fillText('分数: ' + this.score, padding, barHeight / 2 - 4);

    // 右侧：等级 + 距下一级
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#ffcc00';
    ctx.textAlign = 'right';
    const levelText = 'Lv.' + this.level;
    const nextText = '下一级: ' + pointsToNext + ' 分';
    ctx.fillText(levelText + '  |  ' + nextText, this.width - padding, barHeight / 2 - 4);
    ctx.shadowBlur = 0;
  }

  // ---- 游戏循环 ----
  start() {
    if (this.running) return;
    this.running = true;
    this.lastTime = performance.now();
    // 初始预生成一个图形，方便测试
    this.spawnShape();
    requestAnimationFrame((t) => this.gameLoop(t));
  }

  gameLoop(timestamp) {
    if (!this.running) return;

    // delta-time 计算 + clamp
    let dt = timestamp - this.lastTime;
    this.lastTime = timestamp;
    if (dt <= 0) dt = 16.67;
    dt = Math.min(dt, CONFIG.DELTA_TIME_CLAMP);
    const dtSec = dt / 1000;

    // 暂停时只渲染，不更新
    if (this.paused) {
      this.render();
      requestAnimationFrame((t) => this.gameLoop(t));
      return;
    }

    // 游戏结束后只更新特效 + 渲染，不再更新图形/生成
    if (this.gameOver) {
      this.updateGameOver(dtSec);
      this.render();
      requestAnimationFrame((t) => this.gameLoop(t));
      return;
    }

    this.update(dtSec);
    this.render();

    requestAnimationFrame((t) => this.gameLoop(t));
  }

  // ---- 暂停/继续 ----
  pause() {
    this.paused = true;
    document.getElementById('pauseOverlay').style.display = 'flex';
    // 切换为播放图标
    document.getElementById('pauseBtn').innerHTML = '<i class="bi bi-play-fill" style="font-size: 18px;"></i>';
  }

  resume() {
    this.paused = false;
    document.getElementById('pauseOverlay').style.display = 'none';
    // 切换为暂停图标
    document.getElementById('pauseBtn').innerHTML = '<i class="bi bi-pause-fill" style="font-size: 18px;"></i>';
  }

  // 游戏结束后的特效计时，完成后跳转
  updateGameOver(dt) {
    if (this.gameOverEffect) {
      this.gameOverEffect.update(dt);
      if (!this.gameOverEffect.alive) {
        // GAME OVER 动画播完，跳转到分数页
        window.location.href = 'score.html?score=' + this.score + '&level=' + this.level;
      }
    }
  }

  update(dt) {
    // 按间隔生成图形
    this.spawnTimer += dt * 1000;
    const interval = getSpawnInterval(this.level);
    if (this.spawnTimer >= interval) {
      this.spawnTimer -= interval;
      this.spawnShape();
    }

    // 更新所有图形
    for (let i = this.shapes.length - 1; i >= 0; i--) {
      const shape = this.shapes[i];
      shape.update(dt);
      // 红线触碰判定（包围盒底部 ≥ 红线 Y）
      if (shape.y + shape.bounds.radius >= this.deadLineY && !this.gameOver) {
        this.endGame();
        return; // 立即停止本轮更新
      }
      // 超出画布底部则回收（安全兜底）
      if (shape.isOutOfBounds(this.height)) {
        this.shapes.splice(i, 1);
        this.pool.release(shape);
      }
    }

    // 更新浮动文字
    for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
      const ft = this.floatingTexts[i];
      ft.update(dt);
      if (!ft.alive) {
        this.floatingTexts.splice(i, 1);
      }
    }

    // 更新 LEVEL UP 特效
    if (this.levelUpEffect) {
      this.levelUpEffect.update(dt);
      if (!this.levelUpEffect.alive) {
        this.levelUpEffect = null;
      }
    }

    // 更新红线颜色计时器（1秒周期）
    this.deadLineTimer += dt;
    if (this.deadLineTimer >= 1.0) {
      this.deadLineTimer -= 1.0;
    }
  }

  render() {
    const ctx = this.ctx;
    // 赛博朋克网格背景
    this.drawBackground(ctx);

    // 底部红色死亡线
    this.drawDeadLine(ctx);

    // 绘制所有图形（后面的在上面）
    for (const shape of this.shapes) {
      shape.draw(ctx);
    }

    // 绘制浮动文字
    for (const ft of this.floatingTexts) {
      ft.draw(ctx);
    }

    // 绘制 LEVEL UP 特效
    if (this.levelUpEffect) {
      this.levelUpEffect.draw(ctx, this.width, this.height);
    }

    // 绘制 GAME OVER 特效
    if (this.gameOverEffect) {
      this.gameOverEffect.draw(ctx, this.width, this.height);
    }

    // 绘制 HUD（在所有元素之上）
    this.drawHUD(ctx);
  }
}

// ==============================
// 8. 启动
// ==============================
const game = new Game();
game.start();
</script>
