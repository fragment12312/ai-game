<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>clicker-game</title>
<!-- Bootstrap 4 CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  /* 暂停按钮响应式定位 */
  #pauseBtn {
    left: 130px;
  }
  /* 移动端适配：屏幕宽度小于 400px 时 */
  @media (max-width: 400px) {
    #pauseBtn {
      left: 100px;
    }
  }
  /* 更小屏幕 */
  @media (max-width: 320px) {
    #pauseBtn {
      left: 80px;
    }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<!-- 暂停按钮 -->
<button id="pauseBtn" class="btn btn-primary btn-sm" style="position: fixed; top: 10px; background: rgba(5, 5, 30, 0.85); border-color: #33ccff; color: #33ccff; box-shadow: 0 0 12px rgba(51, 204, 255, 0.3); border-radius: 8px; padding: 4px 12px; z-index: 10;">
  <i class="bi bi-pause-fill" style="font-size: 18px;"></i>
</button>
<!-- 暂停遮罩 -->
<div id="pauseOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 100; align-items: center; justify-content: center; display: none;">
  <button id="resumeBtn" class="btn btn-primary" style="background: rgba(51, 204, 255, 0.2); border-color: #33ccff; color: #33ccff; padding: 20px 30px; border-radius: 50%; box-shadow: 0 0 30px rgba(51, 204, 255, 0.5);">
    <i class="bi bi-play-fill" style="font-size: 60px;"></i>
  </button>
</div>
<!-- jQuery (Bootstrap 4 需要) -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<!-- Bootstrap 4 Bundle JS (包含 Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

<!-- ====== 游戏模块（加载顺序 = 依赖图，不可变） ====== -->
<!-- 0. 配置：CONFIG 全局对象，所有模块依赖 -->
<script src="config.js"></script>
<!-- 1. 难度：数据驱动难度曲线表 + 访问器 -->
<script src="difficulty.js"></script>
<!-- 2. 领域：ShapePool + IrregularShape + 图形工具函数 -->
<script src="shape.js"></script>
<!-- 3. 渲染：FloatingText, LevelUpEffect, drawX(), renderGame() -->
<script src="renderer.js"></script>
<!-- 4. 特效：[DEBUG_VISUAL] 利刃/烟花效果生成 -->
<script src="debug-effects.js"></script>
<!-- 5. 输入：碰撞检测（射线法）, processHit(), 事件绑定 -->
<script src="input.js"></script>
<!-- 6. 编排：Game 类（游戏循环、更新逻辑） -->
<script src="game.js"></script>

<script>
// ==============================
// 启动
// 所有模块已通过 <script> 标签加载完毕，直接创建 Game 实例。
// ==============================
const game = new Game();
game.start();
</script>
</body>
</html>
